      performance (62.3%)", "hallucination rate ≈1.47%". These must come
      from Nature npj Digital Medicine 2025a/2025b. Find the exact papers
      and verify numbers.
    queries:
      - "large language models clinical safety hallucination rate benchmark 2025"
      - "LLM performance drop high-risk clinical scenarios 13.3%"
      - "medical text summarization hallucination 1.47% benchmark"
      - "Nature npj Digital Medicine LLM safety 54.7% 62.3%"

