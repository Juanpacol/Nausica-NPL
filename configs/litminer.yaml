# litminer gap registry — literature we still need to source or verify.
#
# Derived from the gap audit of docs/RESEARCH_FOCUS.md (2026-07-13).
# Each gap:
#   id:       stable slug (used with --gap)
#   priority: critical | high | medium | low
#   need:     what evidence/citation the research document is missing
#   queries:  search strings sent to every enabled source
#   resolve:  known-but-partial identifiers to verify directly
#             (type: arxiv | doi)
#
# Run:  python -m src.litminer            (all gaps)
#       python -m src.litminer --list     (show this registry)
#       python -m src.litminer --gap hybrid-llm-kg-systems

gaps:
  # ------------------------------------------------------------------
  # CRITICAL — cited in RESEARCH_FOCUS.md Part E without full references
  # ------------------------------------------------------------------
  - id: hybrid-llm-kg-systems
    title: "MindMap / medIKAL / CliCARE / MedRAG — full citations"
    priority: critical
    need: >
      Part E names these four LLM+KG hybrids as the systems whose
      sequential-integration flaw Nausica corrects, but none has a full
      reference (authors, venue, DOI). Without them the core gap claim
      is unverifiable.
    queries:
      - "MindMap knowledge graph prompting large language models"
      - "medIKAL integrating knowledge graphs LLM clinical diagnosis"
      - "CliCARE clinical records knowledge graph large language model"
      - "MedRAG retrieval augmented generation medical knowledge graph"

  - id: trustmh-bench
    title: "TrustMH-Bench 2025 — verify and complete the citation"
    priority: critical
    need: >
      Cited as arXiv:2603.03047 with no authors. It is the linchpin for
      "generic medical LLM competence does not transfer to psychiatric
      reasoning" and for choosing OCD. Verify the identifier and get the
      full author list; if the ID is wrong, find the real paper.
    resolve:
      - {type: arxiv, id: "2603.03047"}
    queries:
      - "benchmark trustworthiness large language models mental health"
      - "evaluating LLM safety mental health anxiety depression OCD benchmark"

  # ------------------------------------------------------------------
  # HIGH — claims that need literature grounding before Phase 11
  # ------------------------------------------------------------------
  - id: cognitive-rigidity-ocd
    title: "Cognitive rigidity / flexibility measurement in OCD"
    priority: high
    need: >
      Layer 1.5's rigidity embedding and the CFI metric have no cited
      precedent from the OCD neuropsychology literature. Need canonical
      work on cognitive inflexibility / set-shifting in OCD so CFI can be
      positioned against established constructs (and validated against
      them in Q3).
    queries:
      - "cognitive flexibility set-shifting deficits obsessive-compulsive disorder"
      - "cognitive inflexibility obsessive-compulsive disorder meta-analysis"
      - "executive function set shifting OCD neuropsychology review"

  - id: ocd-epidemiology
    title: "OCD prevalence + diagnostic delay (Section 2 claims)"
    priority: high
    need: >
      "1-2% global prevalence" and "8-17 year average diagnostic delay"
      are asserted without sources. Need the epidemiological studies
      behind both numbers.
    queries:
      - "epidemiology obsessive-compulsive disorder prevalence national comorbidity survey"
      - "duration untreated illness obsessive-compulsive disorder treatment delay"
      - "obsessive-compulsive disorder time to diagnosis treatment gap"

  - id: confidence-calibration
    title: "Confidence calibration (ECE) methodology for Q3"
    priority: high
    need: >
      Q3's success criterion is ECE < 0.10, but no calibration literature
      is cited anywhere. Need the canonical calibration references
      (temperature scaling, ECE definition) plus clinical-ML calibration
      precedents.
    queries:
      - "calibration modern neural networks expected calibration error"
      - "confidence calibration clinical machine learning healthcare"
      - "uncertainty quantification large language models clinical"

  - id: digital-mental-health-privacy
    title: "Privacy / regulatory grounding for Layer 4 (Obsidian, local-first)"
    priority: high
    need: >
      The local-first design claim has no regulatory or academic backing.
      Need literature on privacy and data-protection requirements for
      digital mental health tools (HIPAA/GDPR analyses, on-device
      processing precedents) to justify the Obsidian local-first design.
    queries:
      - "privacy digital mental health apps data protection review"
      - "GDPR HIPAA compliance mental health applications"
      - "local on-device processing privacy clinical language models"

  - id: ema-ocd
    title: "Ecological momentary assessment / intensive sampling in OCD"
    priority: high
    need: >
      Part B's escalation-prediction precedents (Su, Meyer, Kadirvelu)
      are not OCD-specific. Layer 4 assumes continuous narrative capture
      from OCD patients is feasible and informative — need EMA/experience
      sampling studies in OCD to support that assumption.
    queries:
      - "ecological momentary assessment obsessive-compulsive disorder"
      - "experience sampling obsessive-compulsive symptoms daily monitoring"
      - "smartphone digital phenotyping OCD symptom monitoring"

  # ------------------------------------------------------------------
  # MEDIUM — strengthen design rationale / verify partial identifiers
  # ------------------------------------------------------------------
  - id: trustworthiness-survey
    title: "Healthcare LLM trustworthiness survey — verify arXiv:2502.15871"
    priority: medium
    need: >
      Cited with an arXiv ID but no authors. Verify and complete.
    resolve:
      - {type: arxiv, id: "2502.15871"}
    queries:
      - "survey trustworthiness large language models healthcare"

  - id: pre-generation-policy
    title: "Constitutional AI lineage for Fable (pre-generation policy)"
    priority: medium
    need: >
      Fable is presented as novel but its lineage (Constitutional AI,
      rule-conditioned generation) is only indirectly cited via
      Henneking 2025. Need Bai et al.'s Constitutional AI paper and any
      work on policy-constrained generation in clinical/safety domains,
      so Fable is positioned as an instantiation, not an unmoored idea.
    resolve:
      - {type: arxiv, id: "2212.08073"}   # Bai et al., Constitutional AI (to verify)
      - {type: arxiv, id: "2501.17112"}   # Henneking 2025 (cited, verify)
    queries:
      - "constitutional AI harmlessness from AI feedback"
      - "policy constrained text generation safety rules language model"

  - id: ocd-treatment-guidelines
    title: "Which ERP/CBT guideline does Layer 2/3 encode?"
    priority: medium
    need: >
      "ERP guidelines are explicit and published" — true, but the specific
      guideline document Nausica encodes must be cited (APA practice
      guideline, NICE CG31, IOCDF). Also need the ERP efficacy
      meta-analysis behind "first-line treatment".
    queries:
      - "practice guideline treatment obsessive-compulsive disorder exposure response prevention"
      - "NICE guideline obsessive-compulsive disorder CG31"
      - "meta-analysis exposure response prevention OCD efficacy"

  - id: clinical-language-models
    title: "Domain-adapted language model precedents (Layer 1 / classifier)"
    priority: medium
    need: >
      The distortion classifier fine-tunes mental-roberta-base, and
      RESEARCH_FOCUS.md never cites the domain-adaptation lineage
      (MentalBERT, ClinicalBERT, domain-adaptive pretraining). Needed to
      ground Layer 1 model choices.
    queries:
      - "MentalBERT pretrained language models mental healthcare"
      - "publicly available clinical BERT embeddings"
      - "domain-adaptive pretraining language models don't stop pretraining"

  # ------------------------------------------------------------------
  # LOW — attribution hygiene
  # ------------------------------------------------------------------
  - id: cbt-distortion-taxonomy
    title: "Source attribution for the 5-type CBT distortion taxonomy"
    priority: low
    need: >
      docs/TAXONOMY.md uses a 5-type distortion taxonomy attributed
      loosely to "CBT-LLM". Need the original clinical lineage (Beck's
      cognitive distortions, Burns' feeling-good taxonomy) plus the
      CBT-LLM paper itself for the 5-type reduction.
    queries:
      - "CBT-LLM Chinese large language model cognitive behavioral therapy questions"
      - "cognitive distortions detection classification mental health text"
      - "Beck cognitive therapy emotional disorders distortions"

  # ========== CRITICAL GAPS FROM LITERATURE AUDIT ==========

