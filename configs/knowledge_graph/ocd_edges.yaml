    strength: 0.75

  - from: "distortion_emotional_reasoning"
    to: "technique_acceptance_based_erp"
    type: "addressed_by"
    strength: 0.7

  - from: "distortion_mind_reading"
    to: "technique_cognitive_restructuring"
    type: "addressed_by"
    strength: 0.75

  # Core-ERP-mechanism edges (SELF-CHECK FIX): response_prevention is the
  # behavioral mechanism that disconfirms every distortion below, and is the
  # technique with `steps_in` edges into every protocol (see next section).
  # Without these, no obsession -> ... -> protocol path exists at all — this
  # was caught by a referential/reachability self-check before handoff, not
  # by clinical review. EXPERT: please confirm this is clinically sound, not
  # just structurally necessary — response prevention working via a
  # different behavioral mechanism (extinction/inhibitory learning) than
  # cognitive restructuring (belief revision) for the same distortion is a
  # real clinical claim, not just a graph-connectivity patch.

  - from: "distortion_catastrophizing"
    to: "technique_response_prevention"
    type: "addressed_by"
    strength: 0.7
    metadata:
      review_flag: "EXPERT: confirm response prevention as primary behavioral mechanism here"

  - from: "distortion_all_or_nothing"
    to: "technique_response_prevention"
    type: "addressed_by"
    strength: 0.7
    metadata:
      review_flag: "EXPERT: confirm response prevention as primary behavioral mechanism here"

  - from: "distortion_overgeneralization"
    to: "technique_response_prevention"
    type: "addressed_by"
    strength: 0.7
    metadata:
      review_flag: "EXPERT: confirm response prevention as primary behavioral mechanism here"

  - from: "distortion_emotional_reasoning"
    to: "technique_response_prevention"
    type: "addressed_by"
    strength: 0.7
    metadata:
      review_flag: "EXPERT: confirm response prevention as primary behavioral mechanism here"

  - from: "distortion_mind_reading"
    to: "technique_response_prevention"
    type: "addressed_by"
    strength: 0.7
    metadata:
      review_flag: "EXPERT: confirm response prevention as primary behavioral mechanism here"

  # --------------------------------------------- steps_in (cbt_technique -> erp_protocol)

  - from: "technique_graduated_exposure"
    to: "erp_protocol_contamination_graduated"
    type: "steps_in"
    strength: 1.0

  - from: "technique_response_prevention"
    to: "erp_protocol_contamination_graduated"
    type: "steps_in"
    strength: 1.0

  - from: "technique_imaginal_exposure"
    to: "erp_protocol_harm_imaginal"
    type: "steps_in"
    strength: 1.0

  - from: "technique_response_prevention"
    to: "erp_protocol_harm_imaginal"
    type: "steps_in"
    strength: 0.95

  - from: "technique_imaginal_exposure"
    to: "erp_protocol_sexual_imaginal"
    type: "steps_in"
    strength: 1.0

  - from: "technique_response_prevention"
    to: "erp_protocol_sexual_imaginal"
    type: "steps_in"
    strength: 0.95

  - from: "technique_graduated_exposure"
    to: "erp_protocol_religious_graduated"
    type: "steps_in"
    strength: 0.95

  - from: "technique_response_prevention"
    to: "erp_protocol_religious_graduated"
    type: "steps_in"
    strength: 0.95

  - from: "technique_response_prevention"
    to: "erp_protocol_symmetry_response_prevention"
    type: "steps_in"
    strength: 1.0

  - from: "technique_stepped_care_low_intensity"
    to: "erp_protocol_stepped_care_general"
    type: "steps_in"
    strength: 1.0

  # Adjunct-technique edges (SELF-CHECK FIX): cognitive_restructuring,
  # inhibitory_learning, and acceptance_based_erp had `addressed_by` edges
  # from distortions but no `steps_in` edge into any protocol — orphaned
  # nodes reachable from nowhere. Connecting them as adjunct (not primary)
  # techniques so the graph has no dead ends. EXPERT: confirm these
  # adjunct pairings, or remove if not clinically standard practice.

  - from: "technique_cognitive_restructuring"
    to: "erp_protocol_contamination_graduated"
    type: "steps_in"
    strength: 0.5
    metadata:
      review_flag: "EXPERT: adjunct technique, not core ERP mechanism — confirm inclusion"

  - from: "technique_inhibitory_learning"
    to: "erp_protocol_contamination_graduated"
    type: "steps_in"
    strength: 0.6
    metadata:
      review_flag: "EXPERT: confirm inhibitory-learning framing applies here specifically"

  - from: "technique_acceptance_based_erp"
    to: "erp_protocol_symmetry_response_prevention"
    type: "steps_in"
    strength: 0.5
    metadata:
      review_flag: "EXPERT: adjunct technique — confirm inclusion and whether it fits better elsewhere"

  # ----------------------------------- contraindicates (patient_state -> erp_protocol)
  # SAFETY-CRITICAL section — completeness matters more than precision here;
  # expert should actively look for MISSING edges, not just correct existing ones.
  #
  # SELF-CHECK FIX: src/knowledge_graph/schema.py's EdgeType docstring defines
  # CONTRAINDICATES as "patient_state -> erp_protocol", not
  # "contraindication -> erp_protocol". Edges below originate from the
  # `patient_state_*` marker nodes (each linked to its declarative
  # `contraindication_*` catalog entry via `metadata.contraindication_ref`
  # in ocd_nodes.yaml), matching the schema contract and the original
  # placeholder pattern this draft replaced.

  - from: "patient_state_active_psychosis"
    to: "erp_protocol_contamination_graduated"
