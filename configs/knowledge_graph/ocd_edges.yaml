  - from: "obsession_contamination"
    to: "symptom_washing_contamination"
    type: "triggers"
    strength: 0.9

  - from: "obsession_contamination"
    to: "symptom_avoidance_contamination"
    type: "triggers"
    strength: 0.85

  - from: "obsession_harm"
    to: "symptom_checking_harm"
    type: "triggers"
    strength: 0.9

  - from: "obsession_harm"
    to: "symptom_mental_reviewing_harm"
    type: "triggers"
    strength: 0.8

  - from: "obsession_sexual"
    to: "symptom_mental_neutralizing_sexual"
    type: "triggers"
    strength: 0.85

  - from: "obsession_sexual"
    to: "symptom_reassurance_seeking_sexual"
    type: "triggers"
    strength: 0.75

  - from: "obsession_religious"
    to: "symptom_confession_religious"
    type: "triggers"
    strength: 0.85

  - from: "obsession_religious"
    to: "symptom_praying_rituals_religious"
    type: "triggers"
    strength: 0.85

  - from: "obsession_symmetry"
    to: "symptom_ordering_arranging_symmetry"
    type: "triggers"
    strength: 0.9

  - from: "obsession_symmetry"
    to: "symptom_repeating_symmetry"
    type: "triggers"
    strength: 0.85

  # ------------------------------------------------ manifests_as (symptom -> distortion)
  # DRAFT clinical-logic mapping — most in need of expert correction (least
  # literature-grounded step: which single distortion dominates a given
  # compulsion is a clinical judgment call, not a mined fact).

  - from: "symptom_washing_contamination"
    to: "distortion_catastrophizing"
    type: "manifests_as"
    strength: 0.6
    metadata:
      review_flag: "EXPERT: fear of catastrophic illness/death from contamination — confirm or replace"

  - from: "symptom_avoidance_contamination"
    to: "distortion_all_or_nothing"
    type: "manifests_as"
    strength: 0.6
    metadata:
      review_flag: "EXPERT: clean/contaminated binary framing — confirm or replace"

  - from: "symptom_checking_harm"
    to: "distortion_catastrophizing"
    type: "manifests_as"
    strength: 0.65
    metadata:
      review_flag: "EXPERT: fear of causing catastrophic harm — confirm or replace"

  - from: "symptom_mental_reviewing_harm"
    to: "distortion_overgeneralization"
    type: "manifests_as"
    strength: 0.55
    metadata:
      review_flag: "EXPERT: 'one intrusive thought means I'm dangerous' — confirm or replace"

  - from: "symptom_mental_neutralizing_sexual"
    to: "distortion_emotional_reasoning"
    type: "manifests_as"
    strength: 0.6
    metadata:
      review_flag: "EXPERT: disgust/anxiety taken as evidence the thought is meaningful — confirm or replace"

  - from: "symptom_reassurance_seeking_sexual"
    to: "distortion_mind_reading"
    type: "manifests_as"
    strength: 0.55
    metadata:
      review_flag: "EXPERT: assuming others will judge the intrusive thought — confirm or replace"

  - from: "symptom_confession_religious"
    to: "distortion_catastrophizing"
    type: "manifests_as"
    strength: 0.6
    metadata:
      review_flag: "EXPERT: fear of eternal/severe consequence for perceived sin — confirm or replace"

  - from: "symptom_praying_rituals_religious"
    to: "distortion_all_or_nothing"
    type: "manifests_as"
    strength: 0.55
    metadata:
      review_flag: "EXPERT: perfect piety vs. sinfulness binary — confirm or replace"

  - from: "symptom_ordering_arranging_symmetry"
    to: "distortion_emotional_reasoning"
    type: "manifests_as"
    strength: 0.6
    metadata:
      review_flag: "EXPERT: 'doesn't feel right' taken as evidence something is wrong — confirm or replace"

  - from: "symptom_repeating_symmetry"
    to: "distortion_overgeneralization"
    type: "manifests_as"
    strength: 0.55
    metadata:
      review_flag: "EXPERT: 'if not perfect, everything is ruined' — confirm or replace"

  # ------------------------------------------ addressed_by (distortion -> cbt_technique)

  - from: "distortion_catastrophizing"
    to: "technique_cognitive_restructuring"
    type: "addressed_by"
    strength: 0.8

  - from: "distortion_catastrophizing"
    to: "technique_inhibitory_learning"
    type: "addressed_by"
    strength: 0.75

  - from: "distortion_all_or_nothing"
    to: "technique_cognitive_restructuring"
    type: "addressed_by"
    strength: 0.8

  - from: "distortion_overgeneralization"
    to: "technique_cognitive_restructuring"
