    type: "escalates_to"
    strength: 0.5
    metadata:
      review_flag: "EXPERT SIGN-OFF REQUIRED — this edge feeds a safety-critical rule; do not accept the placeholder strength"

  - from: "patient_state_active_psychosis"
    to: "patient_state_high_suicidal_risk"
    type: "escalates_to"
    strength: 0.4
    metadata:
      review_flag: "EXPERT: comorbidity risk pathway — confirm or remove"

