# OCD Knowledge Graph — edges (Phase 6 DRAFT, pending clinical expert sign-off).
#
# STATUS: AI-assisted DRAFT. Same caveat as ocd_nodes.yaml — NOT clinically
# validated. Every edge, especially `contraindicates` and `strength` values,
# needs explicit expert review. See docs/PHASE6_CLINICAL_REVIEW.md.
#
# DO NOT use these values in any query_treatment path until Phase 6 sign-off.
#
# `type` must be a value of src.knowledge_graph.schema.EdgeType; `from`/`to`
# must reference ids defined in ocd_nodes.yaml. `strength` here is an
# AI-estimated placeholder confidence (0-1), NOT a curator's real judgment —
# the expert must replace every value, not just spot-check them.

