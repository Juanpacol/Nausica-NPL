# OCD Knowledge Graph — nodes (Phase 6 content, SHAPE ONLY).
#
# Hand-curated with an OCD/ERP clinical expert holding veto over content
# (docs/IMPLEMENTATION_PLAN.md, Phase 6). Loaded by
# src/knowledge_graph/ocd_graph.py::OCDGraph.from_yaml via configs/knowledge_graph.yaml.
# `type` must be a value of src.knowledge_graph.schema.NodeType.
#
# Target size: ~40 nodes across obsessions, symptoms, distortion patterns,
# CBT techniques, ERP protocols, contraindications, and patient-state
# markers. The rows below are placeholder examples illustrating the shape
# expected by each NodeType's `metadata` — not clinically reviewed content.
# DO NOT use these values in any query_treatment path until Phase 6 sign-off.

nodes:
  - id: "obsession_contamination"
    type: "obsession"
    label: "Contamination fear"
    metadata:
      severity_scale: [1, 10]
      dsm5_code: "F42.211"

  - id: "symptom_avoidance_washing"
    type: "symptom"
    label: "Compulsive washing / avoidance"
    metadata: {}

  - id: "distortion_catastrophizing"
    type: "distortion"
    label: "Catastrophizing"
    metadata:
      taxonomy_label: "catastrophizing"  # must match configs/data.yaml taxonomy.labels

  - id: "technique_graduated_exposure"
    type: "cbt_technique"
    label: "Graduated exposure"
    metadata: {}

  - id: "erp_protocol_contamination_graduated"
    type: "erp_protocol"
    label: "Graduated exposure protocol — contamination"
    metadata:
      first_line: true

  - id: "contraindication_active_psychosis"
    type: "contraindication"
    label: "Active psychosis"
    metadata:
      reason: "ERP requires reality-testing capacity not present during psychosis"

  - id: "patient_state_high_suicidal_risk"
    type: "patient_state"
    label: "High suicidal risk"
    metadata:
      threshold: 0.7

  # ... ~40 total nodes per Phase 6 expert sign-off
