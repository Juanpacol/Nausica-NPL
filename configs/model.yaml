# Distortion classifier (Phase 2)

encoder:
  # CC-BY-NC-4.0, gated — see docs/LICENSING.md. Swap to roberta-base if the
  # gate/license becomes a problem; everything else is unchanged.
  base_model: mental/mental-roberta-base
  fallback_model: roberta-base
  max_length: 256

training:
  learning_rate: 2.0e-5
  batch_size: 16
  epochs: 4
  weight_decay: 0.01
  warmup_ratio: 0.1
  output_dir: results/distortion_classifier

# Multi-label: sigmoid + BCEWithLogits, threshold applied at inference
inference:
  decision_threshold: 0.5

# Temporal CFI Transformer (Phase 2) — predicts next-turn distortion vector from
# the turn history. Deliberately small: trained on ~60 synthetic dialogues.
temporal_transformer:
  d_model: 32
  n_heads: 4
  n_layers: 2
  dropout: 0.1
  learning_rate: 1.0e-3
  epochs: 200
  val_fraction: 0.2          # session-level split, never mid-dialogue
  seed: 42
  checkpoint: results/temporal_cfi/model.pt

# Mindset archetypes (Phase 4) — human-readable thinking patterns derived from
# combinations of distortion probabilities. Rule = all listed labels above the
# threshold; first matching rule (by order) wins; fallback when none match.
# Config-driven like the taxonomy — clinicians can tune without touching code.
archetypes:
  activation_threshold: 0.5
  fallback: balanced_thinking
  rules:
    - name: worst_case_thinking
      labels: [catastrophizing, mind_reading]
    - name: black_white_thinking
      labels: [all_or_nothing, overgeneralization]
    - name: emotion_driven_thinking
      labels: [emotional_reasoning]
    - name: catastrophic_focus
      labels: [catastrophizing]
    - name: assumptive_thinking
      labels: [mind_reading]
    - name: absolutist_thinking
      labels: [all_or_nothing]
    - name: pattern_overextension
      labels: [overgeneralization]

# Composite rigidity (Phase 4) — weighted blend of the three independent signals.
# HEURISTIC weights, not calibrated against real data (docs/VALIDATION.md) —
# recalibrate by regression once real longitudinal data exists.
composite_rigidity:
  weights:
    classifier_cfi: 0.5
    temporal_predicted_cfi: 0.25
    embedding_rigidity: 0.25

# Contrastive rigidity embedding (Phase 2) — MiniLM fine-tuned on (rigid, flexible)
# pairs; rigidity_score = projection onto the rigid-flexible centroid axis.
contrastive_embedding:
  base_model: sentence-transformers/all-MiniLM-L6-v2
  epochs: 3
  batch_size: 16
  val_fraction: 0.2
  seed: 42
  output_dir: results/rigidity_embedding
