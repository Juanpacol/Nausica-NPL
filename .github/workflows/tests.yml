name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,db]"
      - name: Lint
        run: ruff check src tests
      - name: Test with coverage
        # Pure-logic tests run everywhere; encoder/API tests self-skip via markers
        # when GPU/network/keys are unavailable (see CLAUDE.md conventions).
        run: pytest --cov=src --cov-report=term-missing
